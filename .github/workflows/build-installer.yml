name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      model:
        description: 'Whisper model to bundle'
        default: 'tiny'
        type: choice
        options:
          - tiny
          - base
          - small

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller

      - name: Download Whisper model
        run: |
          python scripts/download_model.py ${{ inputs.model || 'tiny' }}

      - name: Build with PyInstaller
        run: |
          pyinstaller siqspeak.spec

      - name: Verify build
        run: |
          dir dist\SIQspeak
          if (!(Test-Path "dist\SIQspeak\SIQspeak.exe")) { throw "Build failed - exe not found" }

      - name: Install Inno Setup
        run: |
          choco install innosetup -y --no-progress

      - name: Update installer version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          (Get-Content installer.iss) -replace '#define AppVersion ".*"', "#define AppVersion `"$version`"" | Set-Content installer.iss

      - name: Build installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

      - name: Verify installer
        run: |
          dir installer_output
          if (!(Test-Path "installer_output\SIQspeak-Setup.exe")) { throw "Installer build failed" }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SIQspeak-Setup
          path: installer_output/SIQspeak-Setup.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: installer_output/SIQspeak-Setup.exe
          generate_release_notes: true
          body: |
            ## SIQspeak ${{ github.ref_name }}

            ### Installation
            1. Download **SIQspeak-Setup.exe** below
            2. Run the installer
            3. Done - SIQspeak is ready to use

            No Python installation required. The Whisper speech model is bundled - works offline immediately.

            ### What's included
            - SIQspeak application
            - Whisper `${{ inputs.model || 'tiny' }}` model (bundled)
            - Desktop shortcut (optional)
            - Start Menu entry
            - Run at startup option
            - Uninstaller (Add/Remove Programs)
